# Mosquitto broker — POC configuration
# Basic auth (username/password) + per-user ACLs. No TLS yet (see hardening block).
# Paths are the eclipse-mosquitto:2 container defaults.

persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_type warning
log_type notice
log_type information
connection_messages true

# --- POC listener: plaintext MQTT on 1883, authentication required ---
listener 1883
allow_anonymous false
password_file /mosquitto/config/passwd
acl_file /mosquitto/config/acl

